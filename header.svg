  </circle>
  <circle cx="580" cy="14" r="1.1" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="10" r="0.8" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite"/>
