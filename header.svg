  <rect x="704" y="180" width="5" height="4" fill="#ffcc44" opacity="0.5"/>
  <rect x="713" y="180" width="5" height="4" fill="#4499ff" opacity="0.4"/>
  <rect x="742" y="170" width="4" height="3" fill="#4499ff" opacity="0.5"/>
  <rect x="750" y="170" width="4" height="3" fill="#ffcc44" opacity="0.6"/>
  <rect x="742" y="183" width="4" height="3" fill="#ffcc44" opacity="0.4"/>
  <rect x="810" y="172" width="5" height="4" fill="#ffffaa" opacity="0.5"/>
