  <rect x="738" y="158" width="28" height="92" fill="url(#bldA)"/>
  <rect x="770" y="172" width="32" height="78" fill="url(#bldB)"/>
  <rect x="806" y="160" width="22" height="90" fill="url(#bldA)"/>
  <rect x="832" y="175" width="30" height="75" fill="url(#bldB)"/>
  <rect x="866" y="165" width="34" height="85" fill="url(#bldA)"/>
