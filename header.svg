  <rect width="900" height="320" fill="url(#sky)"/>
  <rect width="900" height="320" fill="url(#horizonGlow)"/>

  <!-- STARS -->
  <circle cx="60"  cy="18" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="120" cy="30" r="0.6" fill="white" opacity="0.8"/>
  <circle cx="310" cy="25" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="420" cy="8"  r="0.9" fill="white" opacity="0.8"/>
  <circle cx="500" cy="20" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="660" cy="30" r="0.7" fill="white" opacity="0.9"/>
  <circle cx="820" cy="22" r="0.6" fill="white" opacity="0.8"/>
  <circle cx="870" cy="8"  r="1"   fill="white" opacity="0.9"/>
  <circle cx="140" cy="50" r="0.5" fill="#aaffcc" opacity="0.7"/>
  <circle cx="280" cy="45" r="0.6" fill="#aaeeff" opacity="0.8"/>
  <circle cx="460" cy="38" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="630" cy="55" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="780" cy="42" r="0.7" fill="#ffeecc" opacity="0.8"/>
  <circle cx="90"  cy="65" r="0.5" fill="white" opacity="0.6"/>
  <circle cx="350" cy="60" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="530" cy="52" r="0.7" fill="white" opacity="0.8"/>
