<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="accent" x1="220" y1="60" x2="950" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 120) rotate(90) scale(180 280)">
      <stop stop-color="#7C3AED" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 280) rotate(90) scale(200 300)">
      <stop stop-color="#06B6D4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>

    <style>
      .float {
        animation: float 5s ease-in-out infinite;
      }

      .pulse {
        animation: pulse 4s ease-in-out infinite;
      }

      .typing {
        overflow: hidden;
        white-space: nowrap;
        animation: typing 5s steps(30,end) infinite;
      }

      .dot {
        animation: blink 2s infinite;
      }

      @keyframes float {
        0%,100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }

      @keyframes pulse {
        0%,100% { opacity: 0.4; }
        50% { opacity: 0.8; }
      }

      @keyframes typing {
        0% { opacity: 0.7; }
        50% { opacity: 1; }
        100% { opacity: 0.7; }
      }

      @keyframes blink {
        0%,100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" rx="24" fill="url(#bg)"/>

  <!-- Animated glow -->
  <ellipse class="pulse" cx="240" cy="120" rx="220" ry="180" fill="url(#glow1)" filter="url(#blur)"/>
  <ellipse class="pulse" cx="1040" cy="280" rx="240" ry="180" fill="url(#glow2)" filter="url(#blur)"/>

  <!-- Grid -->
  <g opacity="0.08">
    <path d="M0 80H1280" stroke="white"/>
    <path d="M0 160H1280" stroke="white"/>
    <path d="M0 240H1280" stroke="white"/>
    <path d="M0 320H1280" stroke="white"/>

    <path d="M160 0V400" stroke="white"/>
    <path d="M320 0V400" stroke="white"/>
    <path d="M480 0V400" stroke="white"/>
    <path d="M640 0V400" stroke="white"/>
    <path d="M800 0V400" stroke="white"/>
    <path d="M960 0V400" stroke="white"/>
    <path d="M1120 0V400" stroke="white"/>
  </g>

  <!-- Floating particles -->
  <circle class="dot" cx="150" cy="90" r="3" fill="#06B6D4"/>
  <circle class="dot" cx="420" cy="60" r="2" fill="#7C3AED"/>
  <circle class="dot" cx="980" cy="110" r="3" fill="#06B6D4"/>
  <circle class="dot" cx="1130" cy="310" r="2" fill="#7C3AED"/>

  <!-- Decorative shape -->
  <path d="M860 90C940 70 1040 120 1070 210C1100 300 1030 350 920 330C810 310 730 240 740 170C750 120 790 100 860 90Z"
        fill="url(#accent)" opacity="0.14" class="float"/>

  <!-- Code card -->
  <g class="float">
    <rect x="760" y="110" width="360" height="180" rx="22" fill="#0B1220" stroke="rgba(255,255,255,0.08)"/>

    <circle cx="792" cy="142" r="6" fill="#EF4444"/>
    <circle cx="816" cy="142" r="6" fill="#F59E0B"/>
    <circle cx="840" cy="142" r="6" fill="#10B981"/>

    <text x="790" y="190" fill="#38BDF8" font-size="20" font-family="'Fira Code', monospace" class="typing">
      const developer = {
    </text>

    <text x="820" y="225" fill="#E2E8F0" font-size="18" font-family="'Fira Code', monospace">
      name: "Hasan",
    </text>

    <text x="820" y="255" fill="#E2E8F0" font-size="18" font-family="'Fira Code', monospace">
      stack: ["C++", "Python", "Web"]
    </text>

    <text x="790" y="285" fill="#38BDF8" font-size="20" font-family="'Fira Code', monospace">
      }
    </text>
  </g>

  <!-- Main text -->
  <text x="120" y="165"
        fill="white"
        font-size="64"
        font-family="Inter, Arial, sans-serif"
        font-weight="700">
    Muhammad Hasan
  </text>

  <text x="120" y="215"
        fill="#94A3B8"
        font-size="26"
        font-family="Inter, Arial, sans-serif">
    Computer Engineering Student • Developer • Designer
  </text>

  <!-- Animated accent line -->
  <rect class="pulse" x="120" y="245" width="220" height="5" rx="999" fill="url(#accent)"/>

  <!-- Skill tags -->
  <g>
    <rect x="120" y="285" width="120" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="155" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">Open Source</text>

    <rect x="255" y="285" width="110" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="292" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">UI/UX</text>

    <rect x="380" y="285" width="140" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="410" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">Problem Solving</text>
  </g>
</svg>
