  <rect x="40"  y="170" width="28" height="80" fill="url(#bldB)"/>
  <rect x="72"  y="178" width="22" height="72" fill="url(#bldA)"/>
  <rect x="98"  y="162" width="32" height="88" fill="url(#bldB)"/>
  <rect x="134" y="172" width="24" height="78" fill="url(#bldA)"/>
  <rect x="162" y="155" width="30" height="95" fill="url(#bldB)"/>
  <!-- Windows left -->
  <rect x="6"   y="198" width="5" height="4" fill="#ffcc44" opacity="0.5"/>
  <rect x="14"  y="198" width="5" height="4" fill="#ffcc44" opacity="0.3"/>
  <rect x="44"  y="182" width="4" height="3" fill="#ffcc44" opacity="0.6"/>
  <rect x="51"  y="182" width="4" height="3" fill="#4499ff" opacity="0.4"/>
  <rect x="44"  y="195" width="4" height="3" fill="#4499ff" opacity="0.5"/>
  <rect x="102" y="172" width="5" height="4" fill="#ffcc44" opacity="0.5"/>
  <rect x="112" y="172" width="5" height="4" fill="#4499ff" opacity="0.4"/>
