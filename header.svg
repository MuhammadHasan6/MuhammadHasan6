  <circle cx="720" cy="72" r="35" fill="url(#moonGlow)" opacity="0.25"/>
  <circle cx="720" cy="72" r="26" fill="#ffe8a0" filter="url(#glow)"/>
  <circle cx="712" cy="66" r="3.5" fill="#f0d080" opacity="0.5"/>
  <circle cx="726" cy="78" r="2"   fill="#f0d080" opacity="0.4"/>
  <circle cx="718" cy="80" r="1.5" fill="#f0d080" opacity="0.35"/>

  <!-- MOUNTAINS -->
  <path d="M0,190 Q80,130 160,150 Q220,120 290,140 Q360,105 430,135 Q510,115 580,138 Q650,108 720,130 Q790,110 860,128 L900,135 L900,210 L0,210 Z" fill="#0e0820" opacity="0.9"/>
  <path d="M0,200 Q60,165 130,175 Q200,155 270,170 Q340,148 410,168 Q480,145 550,165 Q620,150 700,162 Q770,145 840,158 L900,162 L900,220 L0,220 Z" fill="#0b061a" opacity="0.95"/>

