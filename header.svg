<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#050816"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" rx="24" fill="url(#bg)"/>

  <!-- Animated glow blobs SMIL -->
  <circle cx="220" cy="100" r="140" fill="#7C3AED" opacity="0.25" filter="url(#blur)">
    <animate attributeName="cx"      values="220;260;220" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1060" cy="300" r="160" fill="#06B6D4" opacity="0.2" filter="url(#blur)">
    <animate attributeName="cy"      values="300;260;300" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.42;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid -->
  <g opacity="0.06">
    <line x1="0"    y1="80"  x2="1280" y2="80"  stroke="white"/>
    <line x1="0"    y1="160" x2="1280" y2="160" stroke="white"/>
    <line x1="0"    y1="240" x2="1280" y2="240" stroke="white"/>
    <line x1="0"    y1="320" x2="1280" y2="320" stroke="white"/>
    <line x1="160"  y1="0"   x2="160"  y2="400" stroke="white"/>
    <line x1="320"  y1="0"   x2="320"  y2="400" stroke="white"/>
    <line x1="480"  y1="0"   x2="480"  y2="400" stroke="white"/>
    <line x1="640"  y1="0"   x2="640"  y2="400" stroke="white"/>
    <line x1="800"  y1="0"   x2="800"  y2="400" stroke="white"/>
    <line x1="960"  y1="0"   x2="960"  y2="400" stroke="white"/>
    <line x1="1120" y1="0"   x2="1120" y2="400" stroke="white"/>
  </g>

  <!-- Floating particles SMIL -->
  <circle cx="170" cy="90" r="3" fill="#06B6D4">
    <animate attributeName="cy" values="90;70;90" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="70" r="2" fill="#7C3AED">
    <animate attributeName="cy" values="70;50;70" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="110" r="3" fill="#06B6D4">
    <animate attributeName="cy" values="110;90;110" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.4;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1130" cy="300" r="2" fill="#7C3AED">
    <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <!-- extra particles -->
  <circle cx="600" cy="50" r="2" fill="#06B6D4">
    <animate attributeName="cy" values="50;32;50" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="860" cy="200" r="1.5" fill="#7C3AED">
    <animate attributeName="cy" values="200;184;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Main Name -->
  <text x="120" y="168"
        fill="white"
        font-size="64"
        font-family="'Courier New',monospace"
        font-weight="700"
        letter-spacing="2">
    Muhammad Hasan
  </text>

  <!-- Subtitle -->
  <text x="120" y="216"
        fill="#94A3B8"
        font-size="24"
        font-family="'Courier New',monospace"
        letter-spacing="1">
    CISE Engineer  ·  Web Developer  ·  Freelancer
  </text>

  <!-- Animated accent line SMIL -->
  <rect x="120" y="244" height="4" rx="4" fill="url(#accent)" width="200">
    <animate attributeName="width"   values="160;280;160" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;1;0.8"   dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Tags -->
  <rect x="120" y="286" width="130" height="38" rx="999" fill="#111827" stroke="#1E293B"/>
  <text x="185" y="310" fill="#CBD5E1" font-size="15" font-family="'Courier New',monospace" text-anchor="middle">Open Source</text>

  <rect x="264" y="286" width="96" height="38" rx="999" fill="#111827" stroke="#1E293B"/>
  <text x="312" y="310" fill="#CBD5E1" font-size="15" font-family="'Courier New',monospace" text-anchor="middle">UI / UX</text>

  <rect x="374" y="286" width="162" height="38" rx="999" fill="#111827" stroke="#1E293B"/>
  <text x="455" y="310" fill="#CBD5E1" font-size="15" font-family="'Courier New',monospace" text-anchor="middle">Problem Solving</text>

  <!-- Status badge -->
  <rect x="120" y="340" width="148" height="34" rx="999" fill="#0d1117" stroke="#7C3AED"/>
  <circle cx="145" cy="357" r="5" fill="#10B981">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="158" y="362" fill="#10B981" font-size="14" font-family="'Courier New',monospace">Open to Work</text>

  <!-- Code Card floating SMIL -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-10; 0,0" dur="5s" repeatCount="indefinite"/>

    <rect x="780" y="100" width="380" height="200" rx="18"
          fill="#0B1220" stroke="#1E293B" stroke-width="1.2"/>

    <!-- traffic lights -->
    <circle cx="810" cy="130" r="7" fill="#EF4444"/>
    <circle cx="836" cy="130" r="7" fill="#F59E0B"/>
    <circle cx="862" cy="130" r="7" fill="#10B981"/>

    <!-- title bar divider -->
    <line x1="780" y1="148" x2="1160" y2="148" stroke="#1E293B" stroke-width="1"/>

    <!-- code lines -->
    <text x="808" y="183" fill="#38BDF8"  font-size="19" font-family="'Courier New',monospace">const developer = {</text>
    <text x="836" y="214" fill="#94A3B8"  font-size="17" font-family="'Courier New',monospace">name:  <tspan fill="#a5f3fc">"Hasan"</tspan>,</text>
    <text x="836" y="242" fill="#94A3B8"  font-size="17" font-family="'Courier New',monospace">uni:   <tspan fill="#a5f3fc">"NED CISE"</tspan>,</text>
    <text x="836" y="270" fill="#94A3B8"  font-size="17" font-family="'Courier New',monospace">stack: <tspan fill="#a5f3fc">["C++","Python","Web"]</tspan></text>
    <text x="808" y="296" fill="#38BDF8"  font-size="19" font-family="'Courier New',monospace">}</text>

    <!-- cursor blink -->
    <rect x="831" y="283" width="9" height="16" fill="#38BDF8">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bottom right corner accent -->
  <polyline points="1240,380 1260,380 1260,360" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
  <polyline points="20,380 20,360" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.4"/>

</svg>
