<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .orb  { font-family: 'Courier New', Courier, monospace; font-weight: 900; }
    </style>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0010"/>
      <stop offset="40%"  stop-color="#0d0a2a"/>
      <stop offset="75%"  stop-color="#0a1a2f"/>
      <stop offset="100%" stop-color="#051520"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#fffbe6" stop-opacity="1"/>
      <stop offset="30%"  stop-color="#ffe8a0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%"   stop-color="#ff4400" stop-opacity="0.25"/>
      <stop offset="50%"  stop-color="#8800ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#040c10"/>
    </linearGradient>
    <linearGradient id="bldA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="bldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#120c28"/>
      <stop offset="100%" stop-color="#080614"/>
    </linearGradient>
    <pattern id="scan" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect width="900" height="2" fill="black" opacity="0.05"/>
      <rect y="2" width="900" height="2" fill="#00ff88" opacity="0.015"/>
    </pattern>
    <clipPath id="gc1"><rect x="0" y="125" width="900" height="20"/></clipPath>
    <clipPath id="gc3"><rect x="0" y="155" width="900" height="25"/></clipPath>
    <clipPath id="mainClip"><rect width="900" height="320"/></clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#mainClip)">

