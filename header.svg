  <rect x="390" y="148" width="40" height="102" fill="#100c22"/>
  <rect x="400" y="136" width="20" height="14" fill="#0e0a1e"/>
  <rect x="406" y="126" width="8"  height="12" fill="#0c0818"/>
  <line x1="410" y1="126" x2="410" y2="105" stroke="#1a1030" stroke-width="2.5"/>
  <circle cx="410" cy="103" r="3" fill="#ff2222" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <rect x="395" y="158" width="6" height="5" fill="#ffffaa" opacity="0.6"/>
  <rect x="418" y="158" width="6" height="5" fill="#ffffaa" opacity="0.4"/>
  <rect x="395" y="172" width="6" height="5" fill="#4499ff" opacity="0.5"/>
  <rect x="418" y="172" width="6" height="5" fill="#ffcc44" opacity="0.6"/>
