  <rect x="166" y="180" width="5" height="4" fill="#ffcc44" opacity="0.4"/>
  <!-- Antenna left -->
  <line x1="177" y1="155" x2="177" y2="135" stroke="#1a1030" stroke-width="2"/>
  <circle cx="177" cy="133" r="2.5" fill="#ff4444" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.8s" repeatCount="indefinite"/>
  </circle>

