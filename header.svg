  <line x1="100" y1="260" x2="200" y2="260" stroke="#1a3040" stroke-width="0.5" opacity="0.5"/>
  <line x1="300" y1="265" x2="450" y2="265" stroke="#1a3040" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="258" x2="750" y2="258" stroke="#1a3040" stroke-width="0.5" opacity="0.5"/>
  <line x1="50"  y1="275" x2="180" y2="275" stroke="#0d2030" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="720" cy="262" rx="18" ry="3" fill="#ffe8a0" opacity="0.12"/>
  <line x1="0" y1="250" x2="900" y2="250" stroke="#1a1030" stroke-width="1" opacity="0.8"/>

  <!-- TREES LEFT -->
  <g fill="#060412">
    <polygon points="0,250 20,210 40,250"/>
    <polygon points="10,250 35,200 60,250"/>
    <polygon points="30,250 55,215 80,250"/>
    <polygon points="55,250 75,220 95,250"/>
    <polygon points="75,250 98,206 121,250"/>
    <polygon points="105,250 125,217 145,250"/>
    <polygon points="130,250 152,210 174,250"/>
    <rect x="18"  y="240" width="4" height="10"/>
    <rect x="33"  y="240" width="4" height="10"/>
    <rect x="53"  y="241" width="4" height="9"/>
    <rect x="73"  y="240" width="4" height="10"/>
  </g>
  <!-- TREES RIGHT -->
  <g fill="#060412">
    <polygon points="726,250 748,208 770,250"/>
    <polygon points="750,250 775,198 800,250"/>
    <polygon points="785,250 808,212 831,250"/>
    <polygon points="815,250 836,220 857,250"/>
    <polygon points="842,250 864,207 886,250"/>
    <polygon points="868,250 890,215 912,250"/>
    <rect x="746" y="240" width="4" height="10"/>
    <rect x="773" y="240" width="4" height="10"/>
    <rect x="806" y="241" width="4" height="9"/>
    <rect x="834" y="240" width="4" height="10"/>
  </g>

  <!-- SCANLINES -->
  <rect width="900" height="320" fill="url(#scan)"/>

  <!-- HUD FRAME -->
  <polyline points="0,30 0,0 30,0" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <polyline points="870,0 900,0 900,30" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <polyline points="0,290 0,320 30,320" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <polyline points="870,320 900,320 900,290" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- TOP HUD BAR -->
  <rect x="0" y="0" width="900" height="22" fill="#000000" opacity="0.6"/>
  <text x="12" y="14" class="mono" font-size="9" fill="#005533" letter-spacing="2">HXSN_OS · V1.0</text>
  <text x="450" y="14" class="mono" font-size="9" fill="#003322" letter-spacing="2" text-anchor="middle">KARACHI · PKT UTC+5 · MH-6</text>
  <circle cx="882" cy="11" r="3" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="872" y="14" class="mono" font-size="8" fill="#005533" text-anchor="end" letter-spacing="1">ONLINE</text>

  <!-- BOTTOM HUD BAR -->
  <rect x="0" y="300" width="900" height="20" fill="#000000" opacity="0.6"/>
  <text x="12" y="314" class="mono" font-size="8" fill="#003322" letter-spacing="1.5">[ OK ] ALL SYSTEMS NOMINAL  ·  [ WARN ] 9-TO-5: DISABLED BY OPERATOR</text>
  <text x="888" y="314" class="mono" font-size="8" fill="#003322" letter-spacing="1" text-anchor="end">github.com/MuhammadHasan6</text>

  <!-- MAIN TEXT: "Hi, I'm" small label -->
  <text x="450" y="102" class="mono" font-size="11" fill="#00aa66" text-anchor="middle" letter-spacing="5" opacity="0.7">╔ IDENTITY CONFIRMED ╗</text>

  <!-- Glitch ghost red -->
  <text x="452" y="158" class="orb" font-size="52" fill="#ff0088" text-anchor="middle" letter-spacing="3" clip-path="url(#gc1)" opacity="0">
    Hi, I'm Hasan
    <animate attributeName="opacity" values="0;0;0;0.7;0;0;0;0.4;0;0" dur="7s" repeatCount="indefinite"/>
  </text>
  <!-- Glitch ghost cyan -->
  <text x="447" y="158" class="orb" font-size="52" fill="#00ccff" text-anchor="middle" letter-spacing="3" clip-path="url(#gc3)" opacity="0">
    Hi, I'm Hasan
    <animate attributeName="opacity" values="0;0;0;0;0.5;0;0;0;0.3;0" dur="7s" repeatCount="indefinite"/>
  </text>
  <!-- MAIN NAME -->
  <text x="450" y="158" class="orb" font-size="52" fill="#ffffff" text-anchor="middle" letter-spacing="3" filter="url(#textGlow)">Hi, I'm Hasan</text>

  <!-- SUBTITLE -->
  <text x="450" y="190" class="mono" font-size="13" fill="#00ff88" text-anchor="middle" letter-spacing="5" filter="url(#glow)">A Web Developer in the Making</text>

  <!-- Deco line -->
  <line x1="310" y1="200" x2="590" y2="200" stroke="#00ff88" stroke-width="0.5" opacity="0.25"/>
  <circle cx="310" cy="200" r="2" fill="#00ff88" opacity="0.35"/>
  <circle cx="590" cy="200" r="2" fill="#00ff88" opacity="0.35"/>

  <!-- Cursor -->
  <text x="607" y="190" class="mono" font-size="13" fill="#00ff88">&#9611;<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></text>

  <!-- BADGES -->
  <rect x="294" y="210" width="90" height="18" fill="none" stroke="#003322" stroke-width="0.8"/>
  <text x="339" y="222" class="mono" font-size="8" fill="#005533" text-anchor="middle" letter-spacing="2">NED · CISE</text>

  <rect x="392" y="210" width="116" height="18" fill="none" stroke="#00ff88" stroke-width="0.8"/>
  <text x="450" y="222" class="mono" font-size="8" fill="#00ff88" text-anchor="middle" letter-spacing="2">OPEN TO WORK</text>

  <rect x="516" y="210" width="90" height="18" fill="none" stroke="#003322" stroke-width="0.8"/>
  <text x="561" y="222" class="mono" font-size="8" fill="#005533" text-anchor="middle" letter-spacing="2">KARACHI, PK</text>

  </g>
</svg>
