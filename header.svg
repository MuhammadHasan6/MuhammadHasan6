<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#06B6D4;#7C3AED" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#06B6D4">
        <animate attributeName="stop-color" values="#06B6D4;#7C3AED;#06B6D4" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" rx="24" fill="url(#bg)"/>

  <!-- Animated Glow -->
  <circle cx="220" cy="100" r="140" fill="#7C3AED" opacity="0.25" filter="url(#blur)">
    <animate attributeName="cx" values="220;260;220" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>

  <circle cx="1060" cy="300" r="160" fill="#06B6D4" opacity="0.2" filter="url(#blur)">
    <animate attributeName="cy" values="300;260;300" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Grid -->
  <g opacity="0.06">
    <path d="M0 80H1280" stroke="white"/>
    <path d="M0 160H1280" stroke="white"/>
    <path d="M0 240H1280" stroke="white"/>
    <path d="M0 320H1280" stroke="white"/>

    <path d="M160 0V400" stroke="white"/>
    <path d="M320 0V400" stroke="white"/>
    <path d="M480 0V400" stroke="white"/>
    <path d="M640 0V400" stroke="white"/>
    <path d="M800 0V400" stroke="white"/>
    <path d="M960 0V400" stroke="white"/>
    <path d="M1120 0V400" stroke="white"/>
  </g>

  <!-- Floating particles -->
  <g>
    <circle cx="170" cy="90" r="3" fill="#06B6D4">
      <animate attributeName="cy" values="90;70;90" dur="3s" repeatCount="indefinite"/>
    </circle>

    <circle cx="420" cy="70" r="2" fill="#7C3AED">
      <animate attributeName="cy" values="70;50;70" dur="4s" repeatCount="indefinite"/>
    </circle>

    <circle cx="980" cy="110" r="3" fill="#06B6D4">
      <animate attributeName="cy" values="110;90;110" dur="5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="1130" cy="300" r="2" fill="#7C3AED">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main Text -->
  <text x="120" y="165"
        fill="white"
        font-size="64"
        font-family="Inter, Arial, sans-serif"
        font-weight="700">
    Muhammad Hasan
  </text>

  <text x="120" y="215"
        fill="#94A3B8"
        font-size="26"
        font-family="Inter, Arial, sans-serif">
    Computer Engineering Student • Developer • Designer
  </text>

  <!-- Animated Accent Line -->
  <rect x="120" y="245" width="240" height="5" rx="999" fill="url(#accent)">
    <animate attributeName="width" values="160;260;160" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Code Card -->
  <g>
    <animateTransform attributeName="transform"
      type="translate"
      values="0 0;0 -8;0 0"
      dur="5s"
      repeatCount="indefinite"/>

    <rect x="760" y="110" width="360" height="180" rx="22"
          fill="#0B1220"
          stroke="#1E293B"/>

    <circle cx="792" cy="142" r="6" fill="#EF4444"/>
    <circle cx="816" cy="142" r="6" fill="#F59E0B"/>
    <circle cx="840" cy="142" r="6" fill="#10B981"/>

    <text x="790" y="190"
          fill="#38BDF8"
          font-size="20"
          font-family="monospace">
      const developer = {
    </text>

    <text x="820" y="225"
          fill="#E2E8F0"
          font-size="18"
          font-family="monospace">
      name: "Hasan",
    </text>

    <text x="820" y="255"
          fill="#E2E8F0"
          font-size="18"
          font-family="monospace">
      stack: ["C++", "Python", "Web"]
    </text>

    <text x="790" y="285"
          fill="#38BDF8"
          font-size="20"
          font-family="monospace">
      }
    </text>
  </g>

  <!-- Tags -->
  <g>
    <rect x="120" y="285" width="120" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="152" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">Open Source</text>

    <rect x="255" y="285" width="110" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="292" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">UI/UX</text>

    <rect x="380" y="285" width="150" height="40" rx="999" fill="#111827" stroke="#1E293B"/>
    <text x="408" y="311" fill="#CBD5E1" font-size="16" font-family="Inter">Problem Solving</text>
  </g>

</svg>
