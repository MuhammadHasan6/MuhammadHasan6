<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">

<style>
.bg { fill:#0d1117; }

.active {
  fill:#58a6ff;
  opacity:1;
}

.snake {
  fill:#ff3b3b;
}
</style>

<rect class="bg" width="900" height="240" rx="16"/>

<g transform="translate(60,70)">

<!-- H -->
<circle class="active" cx="0" cy="0" r="8"/>
<circle class="active" cx="0" cy="30" r="8"/>
<circle class="active" cx="0" cy="60" r="8"/>

<circle class="active" cx="40" cy="0" r="8"/>
<circle class="active" cx="40" cy="30" r="8"/>
<circle class="active" cx="40" cy="60" r="8"/>

<circle class="active" cx="20" cy="30" r="8"/>

<!-- A -->
<circle class="active" cx="100" cy="60" r="8"/>
<circle class="active" cx="120" cy="0" r="8"/>
<circle class="active" cx="140" cy="60" r="8"/>
<circle class="active" cx="110" cy="30" r="8"/>
<circle class="active" cx="130" cy="30" r="8"/>

<!-- S -->
<circle class="active" cx="200" cy="0" r="8"/>
<circle class="active" cx="220" cy="0" r="8"/>
<circle class="active" cx="200" cy="30" r="8"/>
<circle class="active" cx="220" cy="60" r="8"/>
<circle class="active" cx="200" cy="60" r="8"/>

<!-- A -->
<circle class="active" cx="300" cy="60" r="8"/>
<circle class="active" cx="320" cy="0" r="8"/>
<circle class="active" cx="340" cy="60" r="8"/>
<circle class="active" cx="310" cy="30" r="8"/>
<circle class="active" cx="330" cy="30" r="8"/>

<!-- N -->
<circle class="active" cx="400" cy="60" r="8"/>
<circle class="active" cx="400" cy="30" r="8"/>
<circle class="active" cx="400" cy="0" r="8"/>

<circle class="active" cx="440" cy="60" r="8"/>
<circle class="active" cx="440" cy="30" r="8"/>
<circle class="active" cx="440" cy="0" r="8"/>

<circle class="active" cx="420" cy="20" r="8"/>
<circle class="active" cx="425" cy="40" r="8"/>

<!-- Snake -->
<circle class="snake" r="10">
  <animateMotion
    dur="8s"
    repeatCount="indefinite"
    path="
      M0 0
      L0 60
      L40 60
      L40 0
      L100 60
      L120 0
      L140 60
      L200 0
      L220 0
      L200 30
      L220 60
      L300 60
      L320 0
      L340 60
      L400 60
      L400 0
      L440 60
      L440 0
    "
  />
</circle>

</g>

</svg>
